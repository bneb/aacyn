apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aacyn.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: aacyn
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  aacyn.toml: |
    # aacyn Declarative Filter & Rollup Configuration
    # Generated by Helm chart — override with daemonset.config.filterRules in values.yaml
    {{- if .Values.daemonset.config.filterRules }}
    {{ .Values.daemonset.config.filterRules | nindent 4 }}
    {{- else }}
    # Drop sub-millisecond noise (health checks, heartbeats)
    [[filters]]
    column = "duration"
    op = "lt"
    threshold = 1.0
    action = "drop"
    {{- end }}
---
{{- if or .Values.forwarding.datadog.enabled .Values.forwarding.splunk.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aacyn.fullname" . }}-forwarding
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: aacyn
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  {{- if .Values.forwarding.datadog.enabled }}
  DATADOG_API_KEY: {{ .Values.forwarding.datadog.apiKey | quote }}
  DATADOG_SITE: {{ .Values.forwarding.datadog.site | quote }}
  {{- end }}
  {{- if .Values.forwarding.splunk.enabled }}
  SPLUNK_HEC_URL: {{ .Values.forwarding.splunk.hecUrl | quote }}
  SPLUNK_HEC_TOKEN: {{ .Values.forwarding.splunk.hecToken | quote }}
  {{- end }}
{{- end }}
