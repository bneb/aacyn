# ─────────────────────────────────────────────────────────────────────────────
# aacyn Demo — Nginx Reverse Proxy (Keep-Alive DISABLED)
#
# Forces a new TCP connection per request so the eBPF connect() tracepoint
# fires on every single upstream call. This maximizes socket churn for the
# eBPF demo — in production you would NOT do this.
# ─────────────────────────────────────────────────────────────────────────────

upstream api_backend {
    server api:3000;
    # No keepalive directive — every request gets a fresh socket
}

server {
    listen 80;

    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html>
<head><title>aacyn Demo App</title></head>
<body style="font-family: system-ui; background: #0a0a0a; color: #e0e0e0; padding: 40px;">
  <h1 style="color: #6366f1;">&#127919; aacyn Demo Frontend</h1>
  <p>This page is served by Nginx. It proxies to <code>/api/*</code> which hits the Node API, which queries Postgres.</p>
  <p>None of these containers have telemetry SDK installed.</p>
  <div id="result" style="margin-top: 20px; padding: 16px; background: #1a1a2e; border-radius: 8px; font-family: monospace;"></div>
  <script>
    async function ping() {
      const t0 = performance.now();
      const res = await fetch("/api/healthcheck");
      const data = await res.json();
      const rtt = (performance.now() - t0).toFixed(1);
      const el = document.getElementById("result");
      el.innerHTML =
        "<strong>Last request:</strong> " + rtt + "ms round-trip<br>" +
        "<strong>API latency:</strong> " + data.latency_ms + "ms (includes Postgres pg_sleep(30ms))<br>" +
        "<strong>Timestamp:</strong> " + new Date().toISOString();
    }
    setInterval(ping, 2000);
    ping();
  </script>
</body>
</html>';
    }

    # Reverse proxy to the uninstrumented Node API
    # HTTP/1.0 + Connection: close = new TCP socket per request
    location /api/ {
        proxy_pass http://api_backend/;
        proxy_http_version 1.0;
        proxy_set_header Connection "close";
    }
}
