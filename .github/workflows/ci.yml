name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # TypeScript — Lint
  # ═══════════════════════════════════════════════════════════════════════
  ts-lint:
    name: "TS: Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint

  # ═══════════════════════════════════════════════════════════════════════
  # TypeScript — Type Check
  # ═══════════════════════════════════════════════════════════════════════
  ts-typecheck:
    name: "TS: Type Check (strict)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  # ═══════════════════════════════════════════════════════════════════════
  # TypeScript — Tests (Linux)
  # ═══════════════════════════════════════════════════════════════════════
  ts-test:
    name: "TS: Test (Linux)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      - name: Build native engine (needed for binary ingest tests)
        run: make -C native NATIVE=1
        working-directory: .
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
        env:
          LIBAACYN_PATH: ${{ github.workspace }}/build/libaacyn.so

  # ═══════════════════════════════════════════════════════════════════════
  # Native C — Build + Test (Linux x86_64, AVX-512)
  # ═══════════════════════════════════════════════════════════════════════
  native-linux:
    name: "C: Build + Test (Linux x86_64)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build native engine (AVX-512)
        run: make -C native NATIVE=1
      - name: Run C test suite
        run: make -C native test

  # ═══════════════════════════════════════════════════════════════════════
  # Native C — Build + Test (macOS ARM64, NEON)
  # ═══════════════════════════════════════════════════════════════════════
  native-macos:
    name: "C: Build + Test (macOS ARM64)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build native engine (NEON)
        run: make -C native
      - name: Run C test suite
        run: make -C native test

  # ═══════════════════════════════════════════════════════════════════════
  # Native C — Sanitizer (ASan + UBSan)
  # ═══════════════════════════════════════════════════════════════════════
  native-sanitize:
    name: "C: ASan + UBSan (Linux)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run with sanitizers
        run: make -C native sanitize

  # ═══════════════════════════════════════════════════════════════════════
  # Native C — eBPF Build (Linux, libbpf)
  # ═══════════════════════════════════════════════════════════════════════
  native-ebpf:
    name: "C: eBPF Build (Linux, libbpf)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install libbpf dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libbpf-dev libelf-dev
      - name: Build with eBPF probes
        run: make -C native EBPF=1
      - name: Verify BPF objects exist
        run: |
          test -f build/aacyn_probes.bpf.o || (echo "Missing aacyn_probes.bpf.o" && exit 1)
          test -f build/aacyn_auto.bpf.o || (echo "Missing aacyn_auto.bpf.o" && exit 1)

  # ═══════════════════════════════════════════════════════════════════════
  # Docker — Build validation
  # ═══════════════════════════════════════════════════════════════════════
  docker-build:
    name: "Docker: Build Validation"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build libaacyn in Ubuntu container
        run: docker build -f native/Dockerfile.ubuntu-test -t aacyn-build-test .

  # ═══════════════════════════════════════════════════════════════════════
  # Benchmark — Regression gate (>10% regression = failure)
  # ═══════════════════════════════════════════════════════════════════════
  benchmark-regression:
    name: "Benchmark: Regression Gate"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Build native engine (AVX-512)
        run: make -C native NATIVE=1
      - name: Run scan benchmark
        run: bun run benchmarks/scan_benchmark.ts
      - name: Check regression threshold
        run: |
          echo "Benchmark completed. Check the logs above for scan_duration_max results."
          echo "Baseline: 286us (AMD Ryzen 9 8945HS). Manual review recommended if >315us."
